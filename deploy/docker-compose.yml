version: '3.8'
services:
  wifi-db:
    image: postgres:latest
    container_name: innova_wifi_db
    environment:
      POSTGRES_USER: innova_admin
      POSTGRES_PASSWORD: innova123
      POSTGRES_DB: wifi_analytics_db
    ports:
      - "5433:5432" # Çakışmayı önlemek için 5433 portunu kullanıyoruz
    volumes:
      - postgres_data:/var/lib/postgresql

  grafana:
    image: grafana/grafana-oss:latest
    container_name: innova_grafana
    ports:
      - "3000:3000"
    depends_on:
      - wifi-db
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  grafana_data: